# Cloudflare Pages 配置
# - 新版 Pages 要求：bindings 必须全部写进 wrangler.toml（Dashboard UI 只读）
# - Secrets（ADMIN_PASSWORD / SESSION_SECRET）不写 toml，用 `wrangler pages secret put` 单独设

name = "rain-portfolio"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

[vars]
SITE_ID = "rain"
IMG_BASE_URL = "https://img.ggjj.app"
# 美术作品全走 postimg 外链，R2 只存传媒附件（视频/音频/PDF），配额设宽裕
MAX_IMAGES = "200"

[[kv_namespaces]]
binding = "DATA"
id = "3c96c6a6138f42ee80dce1c2ce567de2"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "ggjj-assets"
